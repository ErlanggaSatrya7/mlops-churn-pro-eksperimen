name: MSML CI Pipeline
on: [push]

jobs:
  run-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/anggasatrya007/mlops-churn-pro-eksperimen.mlflow"
          MLFLOW_TRACKING_USERNAME: "anggasatrya007"
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          pip install mlflow dagshub
          mlflow run MLProject --env-manager=local
          


